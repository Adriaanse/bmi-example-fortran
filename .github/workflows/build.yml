name: Build Intel Shared Library

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build on windows-latest
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Intel Fortran Compiler (ifx)
        uses: fortran-lang/setup-fortran@v1
        with:
          compiler: intel
          version: '2025.2'

      - name: Build DLL for Windows
        shell: bash
        run: |
          curl -O https://raw.githubusercontent.com/csdms/bmi-fortran/master/bmi.f90
          $FC //LD //fpp -Iheat -o libbmi_heat.dll \
            heat/heat.f90 bmi.f90 bmi_heat/bmi_heat_shared.f90

      - name: Harvest Intel Runtime Libraries
        shell: bash
        run: |
          mkdir -p intel_redist
          cp "$CMPLR_ROOT/bin/libifcoremd.dll" ./intel_redist/
          cp "$CMPLR_ROOT/bin/libmmd.dll" ./intel_redist/
          cp "$CMPLR_ROOT/bin/svml_dispmd.dll" ./intel_redist/
          cp "$CMPLR_ROOT/bin/libiomp5md.dll" ./intel_redist/
          echo "Harvested libraries:"
          ls -la ./intel_redist/

      - name: Upload Windows Library
        uses: actions/upload-artifact@v4
        with:
          name: compiled-library-windows
          path: |
            *.dll
            intel_redist/
          if-no-files-found: error

  build-linux:
    name: Build on AlmaLinux 8
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t almalinux8-ifx ./docker/

      - name: Build SO inside container
        run: |
          docker run -v ${{ github.workspace }}:/repo almalinux8-ifx bash -c "
            source /opt/intel/oneapi/setvars.sh --force && \
            cd /repo && \
            curl -O https://raw.githubusercontent.com/csdms/bmi-fortran/master/bmi.f90 && \
            ifx -shared -fPIC -fpp -Iheat -static-intel \
              -o libbmi_heat.so \
              heat/heat.f90 bmi.f90 bmi_heat/bmi_heat_shared.f90
          "

      - name: Upload Linux Library
        uses: actions/upload-artifact@v4
        with:
          name: compiled-library-linux
          path: "*.so"
          if-no-files-found: error
